version: "3.8"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - easyocr_models:/root/.EasyOCR
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: carting
      POSTGRES_USER: carting
      POSTGRES_PASSWORD: carting
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carting"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  easyocr_models:
